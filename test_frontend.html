<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novox Mentor AI - Test</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        /* Modern Dark Mode CSS with Glassmorphism */
        body {
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            width: 90%; max-width: 800px;
            height: 90vh;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        /* Auth Screen */
        #auth-screen, #chat-screen {
            padding: 2rem;
            display: flex;
            flex-direction: column;
            height: 100%;
            box-sizing: border-box;
        }
        #chat-screen { display: none; }
        
        h1 { margin-top: 0; font-size: 2rem; background: -webkit-linear-gradient(#38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p.subtitle { color: #94a3b8; margin-bottom: 2rem; }
        
        input {
            width: 100%; padding: 1rem; margin-bottom: 1rem;
            background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: white; font-family: 'Inter', sans-serif;
            box-sizing: border-box; outline: none; transition: border 0.3s ease;
        }
        input:focus { border-color: #38bdf8; }
        
        button {
            width: 100%; padding: 1rem; margin-bottom: 1rem;
            border: none; border-radius: 12px;
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
            color: white; font-weight: 600; font-size: 1rem; cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -10px #38bdf8; }
        
        .chat-box {
            flex-grow: 1; overflow-y: auto;
            margin-bottom: 1rem; padding: 1rem;
            border: 1px solid rgba(255,255,255,0.05); border-radius: 16px;
            background: rgba(0,0,0,0.1);
            display: flex; flex-direction: column; gap: 1rem;
        }
        /* Scrollbar styles */
        .chat-box::-webkit-scrollbar { width: 8px; }
        .chat-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        .message { padding: 1rem 1.5rem; border-radius: 18px; max-width: 80%; line-height: 1.5; animation: slideIn 0.3s ease forwards; white-space: pre-wrap; word-wrap: break-word;}
        .message.user { background: #38bdf8; color: #0f172a; align-self: flex-end; border-bottom-right-radius: 4px; }
        .message.ai { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); align-self: flex-start; border-bottom-left-radius: 4px; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .input-group { display: flex; gap: 1rem; }
        .input-group input { margin-bottom: 0; }
        .input-group button { width: auto; padding: 0 2rem; margin-bottom: 0; }
        
        #error-box { color: #f87171; font-size: 0.9rem; margin-bottom: 1rem; display: none; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container">
    <!-- Auth Screen -->
    <div id="auth-screen">
        <h1>Novox Test Environment</h1>
        <p class="subtitle">Connect to your Supabase project to test the backend API.</p>
        
        <input type="text" id="sb-url" placeholder="Supabase URL (e.g. https://doyxtvzfwjauhsfblxez.supabase.co)" />
        <input type="password" id="sb-key" placeholder="Supabase Anon Key" />
        <input type="email" id="sb-email" placeholder="Test Email (e.g. test@example.com)" />
        <input type="password" id="sb-pass" placeholder="Test Password" />
        
        <div id="error-box"></div>
        <button onclick="connectAndAuth()" id="connect-btn">Connect & Sign Up / In</button>
    </div>

    <!-- Chat Screen -->
    <div id="chat-screen">
        <h1>Novox AI Mentor</h1>
        <div class="chat-box" id="chat-box">
            <div class="message ai">Hello! I am your AI Mentor. The connection is successful.</div>
        </div>
        <div class="input-group">
            <input type="text" id="msg-input" placeholder="Type a message to the mentor..." onkeypress="if(event.key === 'Enter') sendMessage()" />
            <button onclick="sendMessage()" id="send-btn">Send</button>
        </div>
    </div>
</div>

<script>
    let supabaseClient;
    let userSession;

    window.onload = () => {
        const url = localStorage.getItem('sb_url');
        const key = localStorage.getItem('sb_key');
        const email = localStorage.getItem('sb_email');
        const pass = localStorage.getItem('sb_pass');
        
        if (url) document.getElementById('sb-url').value = url;
        if (key) document.getElementById('sb-key').value = key;
        if (email) document.getElementById('sb-email').value = email;
        if (pass) document.getElementById('sb-pass').value = pass;

        // Auto-connect if all fields are already saved
        if (url && key && email && pass) {
            connectAndAuth();
        }
    };

    async function connectAndAuth() {
        const url = document.getElementById('sb-url').value.trim();
        const key = document.getElementById('sb-key').value.trim();
        const email = document.getElementById('sb-email').value.trim();
        const pass = document.getElementById('sb-pass').value.trim();
        const errBox = document.getElementById('error-box');
        const btn = document.getElementById('connect-btn');

        if (!url || !key || !email || !pass) {
            errBox.innerText = "Please fill in all fields.";
            errBox.style.display = 'block';
            return;
        }

        // Save for next time
        localStorage.setItem('sb_url', url);
        localStorage.setItem('sb_key', key);
        localStorage.setItem('sb_email', email);
        localStorage.setItem('sb_pass', pass);

        btn.innerText = 'Connecting...';
        btn.disabled = true;

        try {
            supabaseClient = supabase.createClient(url, key);
            
            // Try signing up first
            let { data, error } = await supabaseClient.auth.signUp({ email, password: pass });
            if (error && error.message.includes('already registered')) {
                // If exists, sign in
                const signInRes = await supabaseClient.auth.signInWithPassword({ email, password: pass });
                data = signInRes.data;
                error = signInRes.error;
            }

            if (error) throw error;
            
            userSession = data.session;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
        } catch (e) {
            errBox.innerText = e.message;
            errBox.style.display = 'block';
        } finally {
            btn.innerText = 'Connect & Sign Up / In';
            btn.disabled = false;
        }
    }

    async function sendMessage() {
        const input = document.getElementById('msg-input');
        const msg = input.value.trim();
        if (!msg) return;

        appendMessage('user', msg);
        input.value = '';

        const url = document.getElementById('sb-url').value.trim();
        const sendBtn = document.getElementById('send-btn');
        sendBtn.disabled = true;
        
        const aiMessageId = 'ai-' + Date.now();
        appendMessage('ai', '...', aiMessageId);
        
        try {
            const response = await fetch(`${url}/functions/v1/chat`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${userSession.access_token}`
                },
                body: JSON.stringify({ message: msg, session_id: 'test-session-123' })
            });

            if (!response.ok) {
                const errText = await response.text();
                document.getElementById(aiMessageId).innerText = "Error: " + errText;
                sendBtn.disabled = false;
                return;
            }

            // Read the SSE stream
            const reader = response.body.getReader();
            const decoder = new TextDecoder('utf-8');
            let aiText = '';
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                // Keep the last partial line in the buffer
                buffer = lines.pop();
                
                for (const line of lines) {
                    if (line.trim() === '') continue;
                    
                    if (line.startsWith('data: ')) {
                        const dataStr = line.replace('data: ', '').trim();
                        if (dataStr === '[DONE]') continue;
                        try {
                            const data = JSON.parse(dataStr);
                            const textPart = data.choices?.[0]?.delta?.content || '';
                            if (textPart) {
                                aiText += textPart;
                                document.getElementById(aiMessageId).innerText = aiText;
                            }
                        } catch(e) {
                            console.error("Failed to parse JSON:", dataStr, e);
                        }
                    } else {
                        // Fallback: If it's not SSE format, just append the raw text
                        // (This helps if Gemini returned an error object with status 200)
                        try {
                            const data = JSON.parse(line);
                            if (data.error) {
                                aiText += `\n[Error: ${data.error.message || JSON.stringify(data.error)}]`;
                                document.getElementById(aiMessageId).innerText = aiText;
                            }
                        } catch(e) {
                            aiText += line;
                            document.getElementById(aiMessageId).innerText = aiText;
                        }
                    }
                }
            }
            
            if (aiText === '') {
                document.getElementById(aiMessageId).innerText = "Error: Received empty response from the backend.";
            }
        } catch (error) {
            document.getElementById(aiMessageId).innerText = "Error connecting to Edge Function: " + error.message;
        } finally {
            sendBtn.disabled = false;
        }
    }

    function appendMessage(role, text, id = null) {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `message ${role}`;
        if (id) div.id = id;
        div.innerText = text;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }
</script>
</body>
</html>
